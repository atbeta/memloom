# Example collector for hz.pnb.pub — push to Hub on 101 (LAN or VPN reachable)
hub: http://192.168.5.101:8789/ingest
# export MEMLOOM_INGEST_KEY=...
batch_size: 500
state_dir: ~/.memloom-collector
interval: 300

sources:
  # Adapt paths to whatever agents run on hz
  - type: openclaw
    workspace: /home/node/.openclaw/workspace
  - type: openclaw_session
    session_dir: /home/node/.openclaw/agents/main/sessions
  - type: hermes
    db: /path/to/hermes/state.db
