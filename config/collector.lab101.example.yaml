# 101 lab collector — copy to /opt/memloom/config/collector.yaml
hub: http://memloom-server:8789/ingest
# api_key from MEMLOOM_INGEST_KEY in compose .env
batch_size: 500
skip_embed: false
state_dir: /tmp/memloom-collector-state
interval: 300

sources:
  - type: librechat
    mongo_uri: mongodb://librechat-mongodb:27017/
    database: LibreChat

  - type: openclaw
    workspace: /openclaw/workspace

  - type: openclaw_session
    session_dir: /openclaw/sessions
