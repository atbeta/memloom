# Example collector for Mac Studio — push to Hub on 101
hub: http://192.168.5.101:8789/ingest
# export MEMLOOM_INGEST_KEY=...
batch_size: 500
state_dir: ~/.memloom-collector
interval: 3600

sources:
  - type: opencode
    db: ~/.local/share/opencode/opencode.db
  - type: codex
    db: ~/.codex/sessions
  - type: openclaw
    workspace: ~/.openclaw/workspace
  - type: openclaw_session
    session_dir: ~/.openclaw/agents/main/sessions
