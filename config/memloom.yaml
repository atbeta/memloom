# memloom configuration

pipeline:
  data_root: ./data
  log_level: INFO

privacy:
  enabled: true
  strip_patterns:
    - "sk-[A-Za-z0-9_-]{20,}"
    - "sk-ant-[A-Za-z0-9_-]{20,}"
    - "ghp_[A-Za-z0-9]{36,}"
    - "github_pat_[A-Za-z0-9_]{60,}"
    - "AKIA[0-9A-Z]{16}"
    - "xox[abprs]-[A-Za-z0-9-]{10,}"
  redact_replacement: "[REDACTED]"

hosts:
  - name: local
    transport: local

agents:
  - type: openclaw
    host: local
    options:
      workspace: /home/node/.openclaw/workspace

  - type: openclaw_session
    host: local
    options:
      sessions_dir: ~/.openclaw/agents/main/sessions

  - type: claude_code
    host: local
    options:
      paths:
        - ~/.claude/projects/**/*.jsonl

  - type: codex
    host: local
    options:
      paths:
        - ~/.codex/sessions/**/*.jsonl

  - type: generic_jsonl
    host: local
    options:
      paths:
        - ~/some/other/agent/sessions/

# AnythingLLM vector backend — push collected records here for semantic search.
anythingllm:
  enabled: true
  base_url: http://ai-knowledge:3001
  api_key: sk-ai-…59eb
  workspace_slug: ai-knowledge
  auto_embed: true