# memloom — Hub + Collector (lab template for 101: /opt/memloom/)

services:
  memloom-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MEMLOOM_VERSION: "0.9.0"
    image: memloom:0.9.0
    container_name: memloom-server
    restart: unless-stopped
    user: "1000:1000"
    env_file: .env
    working_dir: /app
    ports:
      - "8789:8789"
    volumes:
      - ./data:/data
      - ./config:/config:ro
    networks:
      - edge_net
      - librechat
    extra_hosts:
      - "bge3:192.168.5.13"
    command: ["memloom", "serve", "--host", "0.0.0.0", "--port", "8789", "-c", "/config/memloom.yaml"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8789/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  memloom-collect:
    image: memloom:0.9.0
    container_name: memloom-collect
    restart: unless-stopped
    user: "1000:1000"
    env_file: .env
    working_dir: /app
    volumes:
      - ./config:/config:ro
      # Mount real openclaw-coder paths (101 lab)
      - /opt/openclaw-coder/workspace:/openclaw/workspace:ro
      - /opt/openclaw-coder/config/agents/main/sessions:/openclaw/sessions:ro
    networks:
      - edge_net
      - librechat
    extra_hosts:
      - "bge3:192.168.5.13"
    # Hub-bound collector → POST ingest (not Runner direct-write)
    command:
      [
        "memloom",
        "collector",
        "run",
        "/config/collector.yaml",
        "--loop",
        "--interval",
        "300",
      ]
    depends_on:
      - memloom-server

  # Optional Hub-side AnythingLLM mirror (not part of Collector)
  memloom-push:
    image: memloom:0.9.0
    container_name: memloom-push
    profiles: ["push"]
    restart: unless-stopped
    user: "1000:1000"
    env_file: .env
    working_dir: /app
    volumes:
      - ./data:/data
      - ./config:/config:ro
    networks:
      - edge_net
    command:
      [
        "sh",
        "-c",
        "while true; do memloom push -c /config/memloom.yaml; sleep 600; done",
      ]
    depends_on:
      - memloom-server

networks:
  edge_net:
    external: true
  librechat:
    external: true
